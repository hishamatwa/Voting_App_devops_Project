- name: Deploy Voting App to Kubernetes
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    k8s_ns: voting
    project_root: "{{ playbook_dir }}/../.."
    manifests_path: "{{ project_root }}/k8s-specifications"

  tasks:
    - name: Debug paths
      ansible.builtin.debug:
        msg: "project_root={{ project_root }} | manifests_path={{ manifests_path }}"

    - name: Create namespace (ignore if exists)
      ansible.builtin.command: kubectl create ns {{ k8s_ns }}
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Apply manifests (absolute path)
      ansible.builtin.command: kubectl apply -n {{ k8s_ns }} -f {{ manifests_path }}

    - name: Wait for pods Ready
      ansible.builtin.command: kubectl wait -n {{ k8s_ns }} --for=condition=Ready pod --all --timeout=240s

    - name: Show pods and services
      ansible.builtin.command: kubectl get pods,svc -n {{ k8s_ns }}
      register: out

    - name: Print output
      ansible.builtin.debug:
        msg: "{{ out.stdout_lines }}"
