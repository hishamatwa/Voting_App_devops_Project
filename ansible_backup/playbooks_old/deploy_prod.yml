- name: Deploy Voting App 
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    k8s_ns: voting
    project_root: "{{ playbook_dir }}/../.."
    manifests_path: "{{ project_root }}/kubernetes/apps/voting/prod"

  tasks:
    - name: Apply manifests
      ansible.builtin.command: kubectl apply -n {{ k8s_ns }} -f {{ manifests_path }}

    - name: Wait for pods Ready
      ansible.builtin.command: kubectl wait -n {{ k8s_ns }} --for=condition=Ready pod --all --timeout=240s

    - name: Show services
      ansible.builtin.command: kubectl get svc -n {{ k8s_ns }}
      register: out

    - name: Print output
      ansible.builtin.debug:
        msg: "{{ out.stdout_lines }}"
